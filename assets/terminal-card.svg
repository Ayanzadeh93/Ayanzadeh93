<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280" width="100%" role="img" aria-label="Now Working On">
  <defs>
    <linearGradient id="termBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1b27"/>
      <stop offset="100%" stop-color="#16161e"/>
    </linearGradient>
  </defs>

  <rect width="900" height="280" rx="10" fill="url(#termBg)" stroke="#414868" stroke-width="1"/>

  <!-- Terminal chrome -->
  <rect x="0" y="0" width="900" height="32" rx="10" fill="#16161e"/>
  <circle cx="20" cy="16" r="6" fill="#f7768e"/>
  <circle cx="42" cy="16" r="6" fill="#e0af68"/>
  <circle cx="64" cy="16" r="6" fill="#9ece6a"/>
  <text x="450" y="20" text-anchor="middle" fill="#565f89" font-family="JetBrains Mono, ui-monospace, monospace" font-size="11">aydin@coral-lab: ~/research</text>

  <!-- Terminal content -->
  <g font-family="JetBrains Mono, ui-monospace, monospace" font-size="13">
    <text x="20" y="65" fill="#9ece6a">$</text>
    <text x="40" y="65" fill="#c0caf5">whoami --research</text>

    <text x="20" y="92" fill="#7aa2f7">▸</text>
    <text x="40" y="92" fill="#c0caf5">PhD @ UMBC · CORAL Lab · advisor: </text>
    <text x="345" y="92" fill="#e0af68">Prof. Tim Oates</text>

    <text x="20" y="125" fill="#9ece6a">$</text>
    <text x="40" y="125" fill="#c0caf5">cat current_focus.md</text>

    <text x="20" y="152" fill="#bb9af7">#</text>
    <text x="40" y="152" fill="#c0caf5">Multimodal indoor navigation for blind &amp; low-vision users</text>

    <text x="20" y="185" fill="#9ece6a">$</text>
    <text x="40" y="185" fill="#c0caf5">ls active_projects/</text>

    <text x="40" y="212" fill="#7aa2f7">📁 Floorplan2Guide</text>
    <text x="220" y="212" fill="#565f89">→</text>
    <text x="240" y="212" fill="#c0caf5">LLM-guided floorplan parsing</text>

    <text x="40" y="232" fill="#bb9af7">📁 AgenticRAG</text>
    <text x="220" y="232" fill="#565f89">→</text>
    <text x="240" y="232" fill="#c0caf5">multi-agent RAG for nav instructions</text>

    <text x="40" y="252" fill="#f7768e">📁 AidGPT</text>
    <text x="220" y="252" fill="#565f89">→</text>
    <text x="240" y="252" fill="#c0caf5">PhD thesis · conversational assistive agent</text>
  </g>

  <!-- blinking cursor (CSS animation via SMIL) -->
  <rect x="20" y="265" width="10" height="2" fill="#9ece6a">
    <animate attributeName="opacity" values="0;1;0" dur="1.2s" repeatCount="indefinite"/>
  </rect>
</svg>
