<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 240" width="100%" role="img" aria-label="Research Pipeline">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1b27"/>
      <stop offset="100%" stop-color="#24283b"/>
    </linearGradient>
    <linearGradient id="flowGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7aa2f7"/>
      <stop offset="50%" stop-color="#bb9af7"/>
      <stop offset="100%" stop-color="#f7768e"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#bb9af7"/>
    </marker>
    <filter id="glow"><feGaussianBlur stdDeviation="2"/></filter>
  </defs>

  <rect width="900" height="240" rx="14" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" fill="#c0caf5" font-family="JetBrains Mono, ui-monospace, monospace" font-size="14" font-weight="700" letter-spacing="2">RESEARCH PIPELINE — FLOORPLAN TO INSTRUCTION</text>
  <line x1="280" y1="42" x2="620" y2="42" stroke="url(#flowGrad)" stroke-width="1.5"/>

  <!-- Stage 1: PERCEPTION -->
  <g>
    <rect x="40" y="80" width="180" height="120" rx="10" fill="#1a1b27" stroke="#7aa2f7" stroke-width="2"/>
    <rect x="40" y="80" width="180" height="26" rx="10" fill="#7aa2f7" opacity="0.15"/>
    <text x="130" y="98" text-anchor="middle" fill="#7aa2f7" font-family="JetBrains Mono, monospace" font-size="11" font-weight="700" letter-spacing="2">PERCEPTION</text>
    <text x="60" y="128" fill="#c0caf5" font-family="JetBrains Mono, monospace" font-size="10">▸ Floorplan VLM</text>
    <text x="60" y="148" fill="#c0caf5" font-family="JetBrains Mono, monospace" font-size="10">▸ YOLO detect</text>
    <text x="60" y="168" fill="#c0caf5" font-family="JetBrains Mono, monospace" font-size="10">▸ Open-vocab OD</text>
    <text x="60" y="188" fill="#9d7cd8" font-family="JetBrains Mono, monospace" font-size="9" font-style="italic">→ rooms + objects</text>
  </g>

  <!-- Arrow 1 -->
  <path d="M225 140 L265 140" stroke="#bb9af7" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- Stage 2: REPRESENTATION -->
  <g>
    <rect x="275" y="80" width="180" height="120" rx="10" fill="#1a1b27" stroke="#bb9af7" stroke-width="2"/>
    <rect x="275" y="80" width="180" height="26" rx="10" fill="#bb9af7" opacity="0.15"/>
    <text x="365" y="98" text-anchor="middle" fill="#bb9af7" font-family="JetBrains Mono, monospace" font-size="11" font-weight="700" letter-spacing="2">REPRESENTATION</text>
    <text x="295" y="128" fill="#c0caf5" font-family="JetBrains Mono, monospace" font-size="10">▸ Adjacency graph</text>
    <text x="295" y="148" fill="#c0caf5" font-family="JetBrains Mono, monospace" font-size="10">▸ Scene grounding</text>
    <text x="295" y="168" fill="#c0caf5" font-family="JetBrains Mono, monospace" font-size="10">▸ Vector store</text>
    <text x="295" y="188" fill="#9d7cd8" font-family="JetBrains Mono, monospace" font-size="9" font-style="italic">→ spatial topology</text>
  </g>

  <!-- Arrow 2 -->
  <path d="M460 140 L500 140" stroke="#bb9af7" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- Stage 3: REASONING -->
  <g>
    <rect x="510" y="80" width="180" height="120" rx="10" fill="#1a1b27" stroke="#f7768e" stroke-width="2"/>
    <rect x="510" y="80" width="180" height="26" rx="10" fill="#f7768e" opacity="0.15"/>
    <text x="600" y="98" text-anchor="middle" fill="#f7768e" font-family="JetBrains Mono, monospace" font-size="11" font-weight="700" letter-spacing="2">REASONING</text>
    <text x="530" y="128" fill="#c0caf5" font-family="JetBrains Mono, monospace" font-size="10">▸ Agentic RAG</text>
    <text x="530" y="148" fill="#c0caf5" font-family="JetBrainsEdge Mono, monospace" font-size="10">▸ Path planning</text>
    <text x="530" y="168" fill="#c0caf5" font-family="JetBrains Mono, monospace" font-size="10">▸ Hallucination chk</text>
    <text x="530" y="188" fill="#9d7cd8" font-family="JetBrains Mono, monospace" font-size="9" font-style="italic">→ verified route</text>
  </g>

  <!-- Arrow 3 -->
  <path d="M695 140 L735 140" stroke="#bb9af7" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- Stage 4: OUTPUT -->
  <g>
    <rect x="745" y="80" width="120" height="120" rx="10" fill="#1a1b27" stroke="#9ece6a" stroke-width="2"/>
    <rect x="745" y="80" width="120" height="26" rx="10" fill="#9ece6a" opacity="0.15"/>
    <text x="805" y="98" text-anchor="middle" fill="#9ece6a" font-family="JetBrains Mono, monospace" font-size="11" font-weight="700" letter-spacing="2">OUTPUT</text>
    <text x="805" y="140" text-anchor="middle" fill="#c0caf5" font-family="JetBrains Mono, monospace" font-size="11">🦮</text>
    <text x="805" y="165" text-anchor="middle" fill="#c0caf5" font-family="JetBrains Mono, monospace" font-size="9">BLV-friendly</text>
    <text x="805" y="180" text-anchor="middle" fill="#c0caf5" font-family="JetBrains Mono, monospace" font-size="9">navigation</text>
    <text x="805" y="195" text-anchor="middle" fill="#9ece6a" font-family="JetBrains Mono, monospace" font-size="9">instructions</text>
  </g>

  <!-- Footer tag -->
  <text x="450" y="225" text-anchor="middle" fill="#565f89" font-family="JetBrains Mono, monospace" font-size="9">Floorplan2Guide · AgenticRAG · AidGPT  |  CORAL Lab @ UMBC</text>
</svg>
